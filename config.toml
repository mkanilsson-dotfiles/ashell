language = "en-US"
region = "en-GB"

[animations]
enabled = true

[modules]
left = ["Workspaces", "WindowTitle"]
center = ["Tempo"]
right = ["MediaPlayer", "Privacy",  "SystemInfo", "Notifications", "Tray", "Settings"]

[appearance.menu]
opacity = 1.0

[appearance]
font_name = "JetBrains Mono"
opacity = 1.0
style = "Solid"
scale_factor = 1.1

success_color = "#98971a"
warning_color = "#d79921"
danger_color = "#cc241d"
text_color = "#ebdbb2"

[appearance.primary_color]
base = "#458588"
text = "#ebdbb2"

[appearance.background_color]
base = "#282828"
weak = "#504945"
strong = "#1d2021"
text = "#ebdbb2"
